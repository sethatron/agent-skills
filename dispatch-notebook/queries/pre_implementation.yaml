---
name: "Pre-Implementation Research"
description: "Queries run by dispatch-manager before implementing an Optimus finding"
default_timeout: 180
queries:
  - id: pi_prior_attempts
    name: "Prior Attempts"
    question: "Has a finding of category '<category>' been attempted before? What was tried, what was the outcome, and is it in the resolved findings?"
    timeout_seconds: 180
    cache_hours: 20
    output_section: prior_attempts
    runtime_substitutions:
      - placeholder: "<category>"
        source: "finding.category"

  - id: pi_best_practices
    name: "Best Practices"
    question: "What best practices or tools have been documented for '<finding_title>' type improvements? Cite any external references in the reports."
    timeout_seconds: 180
    cache_hours: 20
    output_section: best_practices
    runtime_substitutions:
      - placeholder: "<finding_title>"
        source: "finding.title"
