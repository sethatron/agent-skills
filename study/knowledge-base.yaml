      tags: [kubernetes, security, bootstrap]
      status: not_started
      source_context: "kubernetes-internals-guide, Part IV Chapter 4"

##############################################################################
# CATEGORY 7: KUBERNETES CONTROLLER INTERNALS
##############################################################################
kubernetes_controllers:
  description: "The informer/controller architecture that powers all Kubernetes reconciliation"

  informer_pipeline:
    - name: "SharedInformer / SharedInformerFactory"
      description: "Client-side caching and notification mechanism; multiple controllers watching the same resource type share a single LIST+WATCH connection and local cache"
      difficulty: 4
      priority: critical
      prerequisites: ["kube-apiserver", "Watch Cache"]
      related: ["Reflector", "DeltaFIFO", "Indexer"]
      tags: [kubernetes, controllers, internals]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "Reflector"
      description: "Informer component that performs the initial LIST then opens a WATCH connection to the API server; pushes events into DeltaFIFO"
      difficulty: 4
      priority: high
      prerequisites: ["SharedInformer"]
      related: ["DeltaFIFO", "ListAndWatch"]
      tags: [kubernetes, controllers, internals]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "DeltaFIFO"
      description: "Specialized queue storing change deltas (Added, Updated, Deleted, Sync) per object key; deduplicates and guarantees per-key ordering"
      difficulty: 5
      priority: medium
      prerequisites: ["Reflector"]
      related: ["Indexer"]
      tags: [kubernetes, controllers, internals]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "Indexer (Local Cache)"
      description: "Thread-safe in-memory store holding current known state of every watched object; all controller Get/List reads come from here, not the API server"
      difficulty: 4
      priority: high
      prerequisites: ["DeltaFIFO"]
      related: ["SharedInformer"]
      tags: [kubernetes, controllers, internals]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "WorkQueue (Rate-Limited)"
      description: "Queue between event handlers and reconcile loop; provides deduplication, exponential backoff on failure, and rate limiting"
      difficulty: 4
      priority: high
      prerequisites: ["Indexer"]
      related: ["Reconcile Loop"]
      tags: [kubernetes, controllers, internals]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "Reconcile Loop"
      description: "Worker goroutines that dequeue keys, fetch objects from the Indexer cache, compare desired vs current state, and take corrective action"
      difficulty: 3
      priority: critical
      prerequisites: ["WorkQueue"]
      related: ["Level-Driven vs Edge-Driven"]
      tags: [kubernetes, controllers, patterns]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "Level-Driven vs Edge-Driven"
      description: "Controllers should act on current state (level), not state transitions (edge); a controller restarting must reconcile correctly without having seen the transition"
      difficulty: 4
      priority: high
      prerequisites: ["Reconcile Loop"]
      related: []
      tags: [kubernetes, controllers, design-patterns]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "ListAndWatch"
      description: "Two-phase pattern: initial LIST to get all existing objects + resourceVersion, then WATCH from that version for incremental updates"
      difficulty: 4
      priority: medium
      prerequisites: ["Reflector"]
      related: ["resourceVersion", "HTTP 410 Gone"]
      tags: [kubernetes, controllers, api]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "client-go"
      description: "Official Go client library for Kubernetes; implements SharedInformers, clientsets, leader election, retry logic; defaults to protobuf for internal communication"
      difficulty: 3
      priority: high
      prerequisites: ["kube-apiserver"]
      related: ["controller-runtime", "SharedInformer"]
      tags: [kubernetes, development, go]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "controller-runtime"
      description: "Higher-level Go library (used by Kubebuilder/Operator SDK) abstracting SharedInformers, caches, and reconcile loops for building Kubernetes operators"
      difficulty: 4
      priority: high
      prerequisites: ["client-go", "SharedInformer"]
      related: []
      tags: [kubernetes, development, operators]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

  specific_controllers:
    - name: "Deployment Controller"
      description: "Watches Deployments, manages ReplicaSets; handles rolling updates, rollbacks, and scaling by creating/updating ReplicaSet objects"
      difficulty: 3
      priority: high
      prerequisites: ["kube-controller-manager", "SharedInformer"]
      related: ["ReplicaSet Controller"]
      tags: [kubernetes, controllers, workloads]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "ReplicaSet Controller"
      description: "Watches ReplicaSets, counts matching Pods via label selector, creates or deletes Pods to match desired replica count"
      difficulty: 3
      priority: high
      prerequisites: ["Deployment Controller"]
      related: ["ownerReferences"]
      tags: [kubernetes, controllers, workloads]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "EndpointSlice Controller"
      description: "Watches Pods and Services, updates EndpointSlice objects when Pods become Ready or unReady; kube-proxy watches these for routing updates"
      difficulty: 3
      priority: high
      prerequisites: ["Health Probes", "kube-proxy"]
      related: ["ClusterIP"]
      tags: [kubernetes, controllers, networking]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

    - name: "Leader Election"
      description: "Mechanism using a Lease object in kube-system where one replica writes its identity with a TTL; used by controller-manager and scheduler for HA"
      difficulty: 4
      priority: high
      prerequisites: ["Lease Object", "Optimistic Concurrency Control"]
      related: ["kube-controller-manager", "kube-scheduler"]
      tags: [kubernetes, ha, internals]
      status: not_started
      source_context: "kubernetes-internals-guide, Part IV Chapter 4"

    - name: "ownerReferences / Cascading Deletion"
      description: "Metadata field linking child objects to parents (Deployment→ReplicaSet→Pod); garbage collector uses these for automatic cascading deletion"
      difficulty: 3
      priority: high
      prerequisites: ["Deployment Controller", "ReplicaSet Controller"]
      related: []
      tags: [kubernetes, lifecycle]
      status: not_started
      source_context: "kubernetes-internals-guide, Part III Chapter 3"

